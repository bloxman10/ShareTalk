<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ShareTalk Rooms</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      height: 100vh;
      background: #e5ddd5;
    }

    /* צד שמאל - חדרים */
    .sidebar {
      width: 200px;
      background: #075e54;
      color: white;
      padding: 10px;
    }

    .room {
      padding: 10px;
      margin: 5px 0;
      background: #128c7e;
      cursor: pointer;
      border-radius: 8px;
      text-align: center;
    }

    .room:hover {
      background: #0b6e63;
    }

    /* צ'אט */
    .chat {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: #075e54;
      color: white;
      padding: 15px;
      text-align: center;
    }

    #messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      padding: 10px;
      border-radius: 10px;
      max-width: 60%;
    }

    .me {
      background: #dcf8c6;
      align-self: flex-end;
    }

    .other {
      background: white;
      align-self: flex-start;
    }

    .input-bar {
      display: flex;
      padding: 10px;
      gap: 10px;
      background: #f0f0f0;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #25d366;
      color: white;
      border-radius: 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- חדרים -->
<div class="sidebar">
  <h3>Rooms</h3>

  <div class="room" onclick="joinRoom('general')"># general</div>
  <div class="room" onclick="joinRoom('gaming')"># gaming</div>
  <div class="room" onclick="joinRoom('school')"># school</div>
</div>

<!-- צ'אט -->
<div class="chat">

  <div class="header" id="roomTitle">Select Room</div>

  <div id="messages"></div>

  <div class="input-bar">
    <input id="msg" placeholder="Type message...">
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
const TOKEN = localStorage.getItem("token");

const socket = io("http://localhost:5000", {
  auth: { token: TOKEN }
});

let currentRoom = "";

// 📜 היסטוריה
function loadHistory(roomId) {
  fetch(`http://localhost:5000/api/messages/${roomId}`)
    .then(res => res.json())
    .then(messages => {
      const box = document.getElementById("messages");
      box.innerHTML = "";
      messages.forEach(addMessage);
    });
}

// 💬 הודעה
function addMessage(data) {
  const div = document.createElement("div");

  div.className = "msg other";
  div.innerText = `${data.username || "Unknown"}: ${data.text}`;

  document.getElementById("messages").appendChild(div);

  div.scrollIntoView({ behavior: "smooth" });
}

// 🚪 כניסה לחדר
function joinRoom(roomId) {
  currentRoom = roomId;

  document.getElementById("roomTitle").innerText = "#" + roomId;

  socket.emit("join_room", roomId);

  loadHistory(roomId);
}

// 📤 שליחה
function sendMessage() {
  const text = document.getElementById("msg").value;

  if (!text || !currentRoom) return;

  socket.emit("send_message", {
    roomId: currentRoom,
    text
  });

  document.getElementById("msg").value = "";
}

// ⚡ realtime
socket.on("receive_message", (data) => {
  addMessage(data);
});
</script>

</body>
</html>
